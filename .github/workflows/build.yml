name: Build Workflow

on:
    push:
        # branches: master

jobs:
    build-windows:
        runs-on: windows-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v1
            - name: Create ISBNdb_API_Key.env
              shell: pwsh
              run: |
                "API_KEY=${{ secrets.API_KEY }}" | Out-File -FilePath ISBNdb_API_Key.env -Encoding ascii
            - name: Check .env source exists
              shell: pwsh
              run: |
                if (Test-Path "ISBNdb_API_Key.env") { Write-Output "ISBNdb_API_Key.env present" }
                else { Write-Output "ISBNdb_API_Key.env missing"; exit 1 }
            - name: Install Python
              uses: actions/setup-python@v4
              with:
                python-version: 3.14
                architecture: 'x64'
            - name: Install PyInstaller
              run: |
                python -m pip install --upgrade pip
                pip install pyinstaller
            - name: Install requirements
              run: |
                python -m pip install --upgrade pip
                pip install -r requirements.txt
            - name: Load environment variables
              run: |
                python -c "from dotenv import load_dotenv; load_dotenv(dotenv_path='ISBNdb_API_Key.env')"
            - name: Run PyInstaller
              run: |
                pyinstaller adoptions_pending_items.spec --clean
            - uses: actions/upload-artifact@v4
              with:
                name: adoptions_pending_items
                path: dist/adoptions_pending_items.exe
            - name: Create Release
              id: create_release
              uses: actions/create-release@v1 
            - name: Upload Release Asset
              id: upload-release-asset
              uses: actions/upload-release-asset@v1
              env:
                GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              with:
                upload_url: ${{ steps.create_release.outputs.upload_url }}
                asset_path: ./dist/adoptions_pending_items.exe
                asset_name: adoptions_pending_items.exe
                asset_content_type: application/zip
