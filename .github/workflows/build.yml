name: Build Workflow

on:
    push:
        # branches: master

jobs:
    build-windows:
        runs-on: windows-latest
        steps:
            - name: Check .env source exits
              run: |
                  ls -la
                  test -f ISBNdb_API_Key.env && echo "ISBNdb_API_Key.env present" || (echo "ISBNdb_API_Key.env missing" && exit 1)
            - name: Checkout
              uses: actions/checkout@v1
            - name: Install Python
              uses: actions/setup-python@v4
              with:
                python-version: 3.14
                architecture: 'x64'
            - name: Install PyInstaller
              run: |
                python -m pip install --upgrade pip
                pip install pyinstaller
            - name: Install requirements
              run: |
                python -m pip install --upgrade pip
                pip install -r requirements.txt
            - name: Load environment variables
              run: |
                python -c "from dotenv import load_dotenv; load_dotenv(dotenv_path='ISBNdb_API_Key.env')"
            - name: Run PyInstaller
              run: |
                pyinstaller adoptions_pending_items.spec --clean
            - uses: actions/upload-artifact@v4
              with:
                name: adoptions_pending_items
                path: dist/adoptions_pending_items.exe
            
            - name: create release
              id: create_release
              uses: actions/create-release@v1
              env:
                GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              with:
                tag_name: ${{ github.event.head_commit.message }}
                release_name: ${{ github.event.head_commit.message }}
                overwrite: true
                body: |
                    Test Release v1.0.0
                draft: false
                prerelease: false
            - name: Upload Release Asset
              id: upload-release-asset
              uses: actions/upload-release-asset@v1
              env:
                GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              with:
                upload_url: ${{ steps.create_release.outputs.upload_url }}
                asset_path: ./dist/adoptions_pending_items.exe
                asset_name: adoptions_pending_items.exe
                asset_content_type: application/zip
